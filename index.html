<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>Bäckerei Wehr – Zeiterfassung</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#f5f5f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;}
.app{width:100%;height:100%;display:flex;flex-direction:column;background:#fff;}
.offline-bar{background:#e74c3c;color:#fff;text-align:center;font-size:12px;font-weight:600;padding:5px;display:none;flex-shrink:0;}
.offline-bar.visible{display:block;}
.sync-bar{background:#2ecc71;color:#fff;text-align:center;font-size:12px;font-weight:600;padding:5px;display:none;flex-shrink:0;}
.sync-bar.visible{display:block;}
.header{border-bottom:3px solid #F5C800;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;height:60px;flex-shrink:0;}
.logo-area{display:flex;align-items:center;gap:8px;}
.logo-circle{width:34px;height:34px;border-radius:50%;border:2px solid #F5C800;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.logo-text{font-size:13px;font-weight:700;color:#1a1a1a;}
.logo-sub{font-size:10px;color:#888;}
.clock{font-size:11px;color:#888;text-align:right;line-height:1.5;}
.screen{flex:1;display:flex;flex-direction:column;padding:12px;gap:8px;overflow:hidden;}

/* NAME GRID */
.name-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;flex:1;}
.name-btn{background:#fafafa;border:1.5px solid #f0f0f0;border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;touch-action:manipulation;width:100%;height:100%;}
.name-btn:active{background:#F5C800;border-color:#F5C800;}
.name-btn.active-work{border-color:#F5C800;background:#fffbea;}
.name-btn.active-break{border-color:#f0a500;background:#fff8e1;}
.name-label{font-size:14px;font-weight:700;color:#1a1a1a;text-align:center;line-height:1.2;}
.name-status{font-size:11px;color:#888;margin-top:4px;text-align:center;min-height:14px;}
.name-status.working{color:#2d7a2d;font-weight:600;}
.name-status.break{color:#f0a500;font-weight:600;}

/* PIN SCREEN */
.pin-area{text-align:center;flex-shrink:0;padding:4px 0;}
.pin-who{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:8px;}
.pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:4px;}
.dot{width:13px;height:13px;border-radius:50%;background:#e0e0e0;}
.dot.filled{background:#F5C800;}
.pin-err{color:#e74c3c;font-size:12px;margin-top:4px;min-height:16px;}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(4,11vh);gap:6px;flex-shrink:0;}
.nkey{background:#fafafa;border:1.5px solid #f0f0f0;border-radius:10px;font-size:22px;font-weight:500;cursor:pointer;color:#1a1a1a;display:flex;align-items:center;justify-content:center;touch-action:manipulation;width:100%;height:100%;}
.nkey:active{background:#F5C800;border-color:#F5C800;}
.nkey.del{font-size:14px;color:#888;}
.nkey.ok{background:#F5C800;border-color:#F5C800;font-size:14px;font-weight:700;}
.btn-ghost{background:#fff;color:#888;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;height:46px;width:100%;cursor:pointer;touch-action:manipulation;flex-shrink:0;}

/* ACTION SCREEN */
.status-box{background:#fafafa;border:1.5px solid #f0f0f0;border-radius:12px;padding:10px;text-align:center;flex-shrink:0;}
.status-emoji{font-size:26px;margin-bottom:3px;}
.status-msg{font-size:15px;font-weight:600;color:#1a1a1a;}
.status-time{font-size:12px;color:#888;margin-top:2px;}
.action-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:22vh 22vh;gap:8px;flex-shrink:0;}
.action-btn{border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;touch-action:manipulation;width:100%;height:100%;}
.action-btn .icon{font-size:26px;}
.action-btn:disabled{opacity:0.2;cursor:not-allowed;}
.btn-start{background:#F5C800;color:#1a1a1a;}
.btn-break{background:#f0f0f0;color:#444;}
.btn-resume{background:#f0f0f0;color:#444;}
.btn-end{background:#1a1a1a;color:#fff;}

/* SUCCESS */
.success-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:10px;}
.s-icon{font-size:56px;}
.s-title{font-size:20px;font-weight:700;color:#1a1a1a;}
.s-sub{font-size:14px;color:#888;}
.s-bar{width:70%;height:4px;background:#f0f0f0;border-radius:2px;margin-top:14px;overflow:hidden;}
.s-fill{height:100%;background:#F5C800;animation:fill 3s linear forwards;}
@keyframes fill{from{width:0%}to{width:100%}}
</style>
</head>
<body>
<div class="app">
  <div class="offline-bar" id="offline-bar">⚠️ Kein Internet — Einträge werden gespeichert und später synchronisiert</div>
  <div class="sync-bar" id="sync-bar">✅ Verbindung wiederhergestellt — Einträge werden synchronisiert</div>
  <div class="header">
    <div class="logo-area">
      <div class="logo-circle">🌾</div>
      <div>
        <div class="logo-text">Bio-Vollwert-Bäckerei Wehr</div>
        <div class="logo-sub">Zeiterfassung</div>
      </div>
    </div>
    <div class="clock" id="clk"></div>
  </div>

  <div class="screen" id="s-main">
    <div class="name-grid" id="name-grid"></div>
  </div>

  <div class="screen" id="s-pin" style="display:none">
    <div class="pin-area">
      <div class="pin-who">Hallo, <span id="pin-name"></span> 👋</div>
      <div class="pin-dots">
        <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
        <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
      </div>
      <div class="pin-err" id="pin-err"></div>
    </div>
    <div class="numpad" id="numpad"></div>
    <button class="btn-ghost" onclick="goBack()">← Zurück</button>
  </div>

  <div class="screen" id="s-action" style="display:none">
    <div class="status-box">
      <div class="status-emoji" id="s-emoji">👋</div>
      <div class="status-msg" id="s-msg">Schön, dass du da bist!</div>
      <div class="status-time" id="s-time"></div>
    </div>
    <div class="action-grid">
      <button class="action-btn btn-start" id="b-start" onclick="doAction('Start')"><span class="icon">▶</span>Start</button>
      <button class="action-btn btn-break" id="b-break" onclick="doAction('Break')"><span class="icon">⏸</span>Pause</button>
      <button class="action-btn btn-resume" id="b-resume" onclick="doAction('Resume')"><span class="icon">↩</span>Weiter</button>
      <button class="action-btn btn-end" id="b-end" onclick="doAction('End')"><span class="icon">⏹</span>Ende</button>
    </div>
    <button class="btn-ghost" onclick="goBack()">← Zurück</button>
  </div>

  <div class="screen" id="s-success" style="display:none">
    <div class="success-wrap">
      <div class="s-icon" id="s-icon">✅</div>
      <div class="s-title" id="s-title"></div>
      <div class="s-sub" id="s-sub"></div>
      <div class="s-bar"><div class="s-fill" id="s-fill"></div></div>
    </div>
  </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbzJyyMoQ3BnCR8IsrQ2x7-u11Y-6UUSqH-q4aShQUBEXCc-jbqHxmVNX7H25WBjfPJu/exec";
const FALLBACK=["Volker M.","Manuel","Isabelle","Tim","Stefan","Thomas","Renate","Jürgen","Ann-Marie","Ela","Marianne","Daniel"];
let who="", pin="", sd=null, isOnline=navigator.onLine;
let allStatuses={};
let employees=[];

function getQueue(){try{return JSON.parse(localStorage.getItem("q")||"[]");}catch(e){return[];}}
function saveQueue(q){try{localStorage.setItem("q",JSON.stringify(q));}catch(e){}}
function addToQueue(name,aktion){const q=getQueue();q.push({name,aktion,ts:new Date().toISOString()});saveQueue(q);}
function getPinCache(){try{return JSON.parse(localStorage.getItem("pc")||"{}");}catch(e){return{};}}

async function syncQueue(){
  const q=getQueue();
  if(!q.length)return;
  document.getElementById("sync-bar").classList.add("visible");
  const failed=[];
  for(const item of q){
    try{await fetch(API,{method:"POST",body:JSON.stringify({action:"logEvent",name:item.name,aktion:item.aktion})});}
    catch(e){failed.push(item);}
  }
  saveQueue(failed);
  setTimeout(function(){document.getElementById("sync-bar").classList.remove("visible");},3000);
}

function updateOnlineStatus(){
  isOnline=navigator.onLine;
  if(isOnline){document.getElementById("offline-bar").classList.remove("visible");syncQueue();}
  else{document.getElementById("offline-bar").classList.add("visible");document.getElementById("sync-bar").classList.remove("visible");}
}
window.addEventListener("online",updateOnlineStatus);
window.addEventListener("offline",updateOnlineStatus);
if(!navigator.onLine)document.getElementById("offline-bar").classList.add("visible");

function tick(){
  const n=new Date();
  document.getElementById("clk").innerHTML=n.toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"short"})+"<br>"+n.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});
}
setInterval(tick,1000);tick();

function show(id){
  ["s-main","s-pin","s-action","s-success"].forEach(function(s){
    document.getElementById(s).style.display=s===id?"flex":"none";
  });
}

function loadAllStatuses(){
  if(!employees.length)return;
  window._scb=function(data){
    if(data.statuses){allStatuses=data.statuses;renderNameGrid();}
  };
  const s=document.createElement("script");
  s.src=API+"?action=getAllStatuses&names="+encodeURIComponent(JSON.stringify(employees))+"&callback=_scb";
  document.head.appendChild(s);
}

function renderNameGrid(){
  const grid=document.getElementById("name-grid");
  grid.innerHTML="";
  employees.forEach(function(name){
    const st=allStatuses[name]||{status:"none",pauseMin:0};
    const btn=document.createElement("button");
    btn.className="name-btn";
    if(st.status==="arbeitet")btn.classList.add("active-work");
    if(st.status==="pause")btn.classList.add("active-break");

    let statusHtml="";
    if(st.status==="arbeitet")statusHtml='<div class="name-status working">🌾 In der Backstube</div>';
    else if(st.status==="pause")statusHtml='<div class="name-status break">☕ Pause: '+st.pauseMin+' Min</div>';
    else if(st.status==="beendet"){
      if(st.pauseMin>0)statusHtml='<div class="name-status">☕ '+st.pauseMin+' Min Pause heute</div>';
      else statusHtml='<div class="name-status"></div>';
    }
    else statusHtml='<div class="name-status"></div>';

    btn.innerHTML='<div class="name-label">'+name+'</div>'+statusHtml;
    btn.onclick=function(){selectName(name);};
    grid.appendChild(btn);
  });
}

function selectName(name){
  who=name;pin="";
  document.getElementById("pin-name").textContent=name;
  document.getElementById("pin-err").textContent="";
  dots();buildPad();show("s-pin");
}

function loadNames(){
  const cached=localStorage.getItem("emp");
  if(cached){try{employees=JSON.parse(cached);renderNameGrid();loadAllStatuses();}catch(e){}}
  window._cb=function(data){
    if(data.employees&&data.employees.length>0){
      employees=data.employees;
      localStorage.setItem("emp",JSON.stringify(employees));
      renderNameGrid();
      loadAllStatuses();
    } else if(!cached){employees=FALLBACK;renderNameGrid();}
  };
  const s=document.createElement("script");
  s.onerror=function(){if(!cached){employees=FALLBACK;renderNameGrid();}};
  s.src=API+"?action=getEmployees&callback=_cb";
  document.head.appendChild(s);
}
loadNames();

// Refresh statuses every 60 seconds
setInterval(loadAllStatuses,60000);

function buildPad(){
  const np=document.getElementById("numpad");np.innerHTML="";
  [1,2,3,4,5,6,7,8,9].forEach(function(k){nb(np,k,function(){key(k);});});
  nb(np,"⌫",function(){key("del");},"del");
  nb(np,0,function(){key(0);});
  nb(np,"OK",function(){key("ok");},"ok");
}
function nb(p,l,cb,c){
  const b=document.createElement("button");
  b.className="nkey "+(c||"");b.textContent=l;
  b.onclick=function(e){e.preventDefault();cb();};
  p.appendChild(b);
}
function key(k){
  if(k==="del"){pin=pin.slice(0,-1);}
  else if(k==="ok"){submit();return;}
  else if(pin.length<4){pin+=String(k);}
  dots();
  if(pin.length===4)setTimeout(submit,50);
}
function dots(){for(var i=0;i<4;i++){document.getElementById("d"+i).className="dot"+(i<pin.length?" filled":"");}}

function submit(){
  if(pin.length!==4)return;
  const cache=getPinCache();
  if(cache[who]&&cache[who]===pin){loadStatus();return;}
  fetch(API,{method:"POST",body:JSON.stringify({action:"checkPin",name:who,pin:pin})})
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.valid){
      const c=getPinCache();c[who]=pin;localStorage.setItem("pc",JSON.stringify(c));
      loadStatus();
    } else {
      const c=getPinCache();delete c[who];localStorage.setItem("pc",JSON.stringify(c));
      document.getElementById("pin-err").textContent="Falscher PIN. Nochmal versuchen.";
      pin="";dots();
    }
  })
  .catch(function(){loadStatus();});
}

function loadStatus(){
  fetch(API,{method:"POST",body:JSON.stringify({action:"getStatus",name:who})})
  .then(function(r){return r.json();})
  .then(function(data){sd=data;showActions();})
  .catch(function(){sd={status:"neu",message:"Schön, dass du da bist!",buttons:["Start"]};showActions();});
}

function showActions(){
  const emap={neu:"👋",arbeitet:"🌾",pause:"☕",beendet:"✅"};
  document.getElementById("s-emoji").textContent=emap[sd.status]||"👋";
  const msg=sd.message==="Arbeitet seit"?sd.message.replace("Arbeitet","In der Backstube"):sd.message;
  document.getElementById("s-msg").textContent=msg;
  document.getElementById("s-time").textContent="";
  const active=sd.buttons||["Start"];
  document.getElementById("b-start").disabled=!active.includes("Start");
  document.getElementById("b-break").disabled=!active.includes("Break");
  document.getElementById("b-resume").disabled=!active.includes("Resume");
  document.getElementById("b-end").disabled=!active.includes("End");
  show("s-action");
}

function doAction(aktion){
  const labels={Start:"Schicht gestartet!",Break:"Pause läuft.",Resume:"Weiter geht's!",End:"Tschüss, bis morgen!"};
  const icons={Start:"🌾",Break:"☕",Resume:"💪",End:"✅"};
  document.getElementById("s-icon").textContent=icons[aktion];
  document.getElementById("s-title").textContent=labels[aktion];
  document.getElementById("s-sub").textContent=who+" · "+new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})+" Uhr";
  var f=document.getElementById("s-fill");f.style.animation="none";f.offsetHeight;f.style.animation="fill 3s linear forwards";
  show("s-success");
  addToQueue(who,aktion);
  if(isOnline){
    fetch(API,{method:"POST",body:JSON.stringify({action:"logEvent",name:who,aktion:aktion})})
    .then(function(){
      var q=getQueue();
      for(var i=q.length-1;i>=0;i--){if(q[i].name===who&&q[i].aktion===aktion){q.splice(i,1);break;}}
      saveQueue(q);
    }).catch(function(){});
  }
  setTimeout(function(){
    who="";pin="";
    loadAllStatuses();
    show("s-main");
  },3000);
}

function goBack(){
  if(document.getElementById("s-action").style.display!=="none"){show("s-pin");}
  else{who="";pin="";show("s-main");}
}
</script>
</body>
</html>
